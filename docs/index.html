<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>WeDo API Docs</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swagger-ui-dist@5/swagger-ui.css">
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f7fb;
      --panel: #ffffff;
      --text: #10233f;
      --muted: #5f718c;
      --accent: #1473e6;
      --border: #d8e2f0;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background:
        radial-gradient(circle at top left, #dcecff 0, transparent 28%),
        linear-gradient(180deg, #f8fbff 0%, var(--bg) 100%);
      color: var(--text);
    }

    .hero {
      max-width: 1200px;
      margin: 0 auto;
      padding: 32px 20px 20px;
    }

    .hero__panel {
      padding: 24px;
      border: 1px solid var(--border);
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.88);
      backdrop-filter: blur(10px);
      box-shadow: 0 16px 40px rgba(16, 35, 63, 0.08);
    }

    .hero h1 {
      margin: 0 0 8px;
      font-size: clamp(2rem, 4vw, 3rem);
    }

    .hero p {
      margin: 0;
      max-width: 760px;
      color: var(--muted);
      line-height: 1.6;
    }

    #swagger-ui {
      max-width: 1200px;
      margin: 0 auto 40px;
      padding: 0 20px 20px;
    }

    .swagger-ui .topbar {
      display: none;
    }
  </style>
</head>
<body>
  <section class="hero">
    <div class="hero__panel">
      <h1>WeDo API</h1>
      <p>
        Static Swagger UI for GitHub Pages. This page reads the bundled
        <code>openapi.json</code> from the same <code>docs/</code> directory,
        so it works without starting the Django server.
      </p>
    </div>
  </section>

  <div id="swagger-ui"></div>

  <script src="https://cdn.jsdelivr.net/npm/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
  <script>
    window.ui = SwaggerUIBundle({
      url: "./openapi.json",
      dom_id: "#swagger-ui",
      deepLinking: true,
      persistAuthorization: true
    });
  </script>
</body>
</html>
